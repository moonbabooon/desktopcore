<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clippy Clicker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #008080;
      font-family: 'MS Sans Serif', Tahoma, sans-serif;
      font-size: 11px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px 10px 30px;
      user-select: none;
    }

    /* Win98 window */
    .win-window {
      background: #c0c0c0;
      border: 2px solid;
      border-color: #fff #808080 #808080 #fff;
      box-shadow: 3px 3px 0 #000;
      width: 820px;
      max-width: 100%;
    }

    .title-bar {
      background: linear-gradient(90deg, #000080, #1084d0);
      color: #fff;
      padding: 3px 6px;
      font-weight: bold;
      font-size: 11px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 4px;
    }

    .title-bar-controls {
      display: flex;
      gap: 2px;
    }

    .win-btn-sm {
      background: #c0c0c0;
      border: 2px solid;
      border-color: #fff #808080 #808080 #fff;
      width: 16px;
      height: 14px;
      font-size: 9px;
      font-weight: bold;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
      color: #000;
      font-family: 'MS Sans Serif', Tahoma, sans-serif;
    }
    .win-btn-sm:active { border-color: #808080 #fff #fff #808080; }

    .window-body {
      display: flex;
      height: 480px;
    }

    /* LEFT: game area */
    .game-area {
      flex: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 16px 12px;
      gap: 10px;
      border-right: 2px solid;
      border-color: #808080 #fff #fff #808080; /* inset divider */
    }

    #clippy-svg {
      cursor: pointer;
      filter: drop-shadow(2px 2px 4px rgba(0,0,0,0.3));
      transition: transform 0.08s;
      display: block;
    }
    #clippy-svg:active { transform: scale(0.9); }

    .speech-bubble {
      position: relative;
      background: #fff;
      border: 1px solid #555;
      border-radius: 6px;
      padding: 8px 12px;
      max-width: 320px;
      text-align: center;
      font-family: 'MS Sans Serif', Tahoma, sans-serif;
      font-size: 11px;
      color: #000;
      min-height: 32px;
      line-height: 1.4;
    }
    .speech-bubble::after {
      content: '';
      position: absolute;
      top: -10px;
      left: 50%;
      transform: translateX(-50%);
      border: 5px solid transparent;
      border-bottom-color: #555;
    }
    .speech-bubble::before {
      content: '';
      position: absolute;
      top: -8px;
      left: 50%;
      transform: translateX(-50%);
      border: 4px solid transparent;
      border-bottom-color: #fff;
      z-index: 1;
    }

    .word-counter {
      font-family: 'MS Sans Serif', Tahoma, sans-serif;
      font-size: 22px;
      font-weight: bold;
      color: #000080;
      letter-spacing: 0.5px;
    }

    .per-second {
      font-family: 'MS Sans Serif', Tahoma, sans-serif;
      font-size: 11px;
      color: #444;
    }

    .click-hint {
      font-family: 'MS Sans Serif', Tahoma, sans-serif;
      font-size: 10px;
      color: #666;
      font-style: italic;
    }

    /* RIGHT: upgrades panel */
    .upgrades-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 210px;
    }

    .upgrades-title {
      background: #c0c0c0;
      border-bottom: 2px solid;
      border-color: #808080 #fff #fff #808080;
      padding: 4px 8px;
      font-weight: bold;
      font-size: 11px;
      font-family: 'MS Sans Serif', Tahoma, sans-serif;
    }

    .upgrades-list {
      flex: 1;
      overflow-y: auto;
      padding: 4px;
      background: #c0c0c0;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .upgrade-btn {
      background: #c0c0c0;
      border: 2px solid;
      border-color: #fff #808080 #808080 #fff;
      padding: 5px 7px;
      cursor: pointer;
      font-family: 'MS Sans Serif', Tahoma, sans-serif;
      font-size: 11px;
      text-align: left;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 1px;
    }
    .upgrade-btn:active:not(:disabled) { border-color: #808080 #fff #fff #808080; }
    .upgrade-btn:disabled {
      color: #808080;
      cursor: default;
    }
    .upgrade-btn .upg-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 4px;
    }
    .upgrade-btn .upg-name {
      font-weight: bold;
      font-size: 11px;
    }
    .upgrade-btn .upg-cost {
      font-size: 10px;
      white-space: nowrap;
      color: #000080;
    }
    .upgrade-btn:disabled .upg-cost { color: #808080; }
    .upgrade-btn .upg-desc {
      font-size: 9px;
      color: #444;
    }
    .upgrade-btn:disabled .upg-desc { color: #808080; }
    .upgrade-btn .upg-owned {
      font-size: 9px;
      color: #006400;
    }
    .upgrade-btn:disabled .upg-owned { color: #808080; }

    /* Status bar */
    .status-bar {
      background: #c0c0c0;
      border-top: 1px solid #808080;
      padding: 2px 6px;
      font-size: 10px;
      font-family: 'MS Sans Serif', Tahoma, sans-serif;
      display: flex;
      gap: 12px;
    }
    .status-bar span {
      border: 1px solid;
      border-color: #808080 #fff #fff #808080;
      padding: 1px 6px;
    }

    /* Floating +word popup */
    .float-popup {
      position: fixed;
      font-family: 'MS Sans Serif', Tahoma, sans-serif;
      font-size: 13px;
      font-weight: bold;
      color: #000080;
      pointer-events: none;
      animation: floatUp 0.7s ease-out forwards;
      z-index: 999;
    }
    @keyframes floatUp {
      0%   { opacity: 1; transform: translateY(0); }
      100% { opacity: 0; transform: translateY(-40px); }
    }

    .back-link {
      margin-top: 10px;
      text-align: center;
    }
    .back-link a {
      color: #000080;
      font-size: 10px;
      font-family: 'MS Sans Serif', Tahoma, sans-serif;
      text-decoration: underline;
    }
    .back-link a:hover { color: #0000ff; }
  </style>
</head>
<body>

<div class="win-window">
  <!-- Title Bar -->
  <div class="title-bar">
    <span id="title-text">📎 Clippy Clicker — Words Written: 0</span>
    <div class="title-bar-controls">
      <button class="win-btn-sm" title="Minimize">_</button>
      <button class="win-btn-sm" title="Maximize">□</button>
      <button class="win-btn-sm" title="Close" onclick="window.location='index.html'">✕</button>
    </div>
  </div>

  <!-- Window Body -->
  <div class="window-body">

    <!-- LEFT: Game Area -->
    <div class="game-area">
      <svg id="clippy-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 100" width="120" style="cursor:pointer;filter:drop-shadow(2px 2px 4px rgba(0,0,0,0.3));transition:transform 0.08s">
        <!-- Body: paperclip shape -->
        <ellipse cx="40" cy="58" rx="22" ry="32" fill="#c8c8c8" stroke="#888" stroke-width="1.5"/>
        <ellipse cx="40" cy="58" rx="15" ry="24" fill="#e8e8e8"/>
        <!-- Face area -->
        <ellipse cx="40" cy="35" rx="20" ry="22" fill="#f5f0e8"/>
        <!-- Eyes -->
        <ellipse cx="33" cy="30" rx="5" ry="6" fill="#fff" stroke="#333" stroke-width="1"/>
        <ellipse cx="47" cy="30" rx="5" ry="6" fill="#fff" stroke="#333" stroke-width="1"/>
        <circle id="pupil-l" cx="34" cy="31" r="3" fill="#1a1a6e"/>
        <circle id="pupil-r" cx="48" cy="31" r="3" fill="#1a1a6e"/>
        <circle cx="35" cy="29.5" r="1" fill="#fff"/>
        <circle cx="49" cy="29.5" r="1" fill="#fff"/>
        <!-- Eyebrows -->
        <path d="M28 23 Q33 20 38 23" stroke="#555" stroke-width="1.5" fill="none" stroke-linecap="round"/>
        <path d="M42 23 Q47 20 52 23" stroke="#555" stroke-width="1.5" fill="none" stroke-linecap="round"/>
        <!-- Mouth -->
        <path id="clippy-mouth" d="M33 40 Q40 45 47 40" stroke="#555" stroke-width="1.5" fill="none" stroke-linecap="round"/>
        <!-- Blush -->
        <ellipse cx="29" cy="38" rx="5" ry="3" fill="#ffaacc" opacity="0.5"/>
        <ellipse cx="51" cy="38" rx="5" ry="3" fill="#ffaacc" opacity="0.5"/>
        <!-- Nose -->
        <ellipse cx="40" cy="36" rx="2" ry="1.5" fill="#e0c8a0" opacity="0.6"/>
        <!-- Arms/paperclip details -->
        <path d="M18 55 Q10 50 12 42 Q14 34 22 36" stroke="#aaa" stroke-width="3" fill="none" stroke-linecap="round"/>
        <path d="M62 55 Q70 50 68 42 Q66 34 58 36" stroke="#aaa" stroke-width="3" fill="none" stroke-linecap="round"/>
      </svg>

      <div class="speech-bubble" id="speech-bubble">
        It looks like you're not clicking me.
      </div>

      <div class="word-counter" id="word-counter">0</div>
      <div style="font-size:11px;font-weight:bold;color:#444;font-family:'MS Sans Serif',Tahoma,sans-serif;">words written</div>
      <div class="per-second" id="per-second">per second: 0.0</div>
      <div class="click-hint">Click Clippy to write words!</div>
    </div>

    <!-- RIGHT: Upgrades Panel -->
    <div class="upgrades-panel">
      <div class="upgrades-title">📦 Upgrades</div>
      <div class="upgrades-list" id="upgrades-list">
        <!-- Populated by JS -->
      </div>
    </div>

  </div>

  <!-- Status Bar -->
  <div class="status-bar">
    <span id="status-wpc">+1 word/click</span>
    <span id="status-wps">0 words/sec</span>
    <span id="status-multi">×1 multiplier</span>
  </div>
</div>

<div class="back-link">
  <a href="index.html">← Back to Desktop</a>
</div>

<script>
  // ── State ──────────────────────────────────────────────────────────────────
  let words = 0;
  let wordsPerClick = 1;
  let wordsPerSec = 0;
  let multiplier = 1;

  const UPGRADES = [
    { id: 0, name: 'Drink Coffee',    baseCost: 10,     desc: '+1 word/click',   count: 0, apply: () => { wordsPerClick += 1; } },
    { id: 1, name: 'Open AI Tools',   baseCost: 75,     desc: '+1 word/sec',     count: 0, apply: () => { wordsPerSec += 1; } },
    { id: 2, name: 'Hire Intern',     baseCost: 400,    desc: '+5 words/sec',    count: 0, apply: () => { wordsPerSec += 5; } },
    { id: 3, name: 'Launch Campaign', baseCost: 2000,   desc: '+20 words/sec',   count: 0, apply: () => { wordsPerSec += 20; } },
    { id: 4, name: 'Win a Webby',     baseCost: 10000,  desc: '+100 words/sec',  count: 0, apply: () => { wordsPerSec += 100; } },
    { id: 5, name: 'Write a Book',    baseCost: 50000,  desc: '+500 words/sec',  count: 0, apply: () => { wordsPerSec += 500; } },
    { id: 6, name: 'Go Viral',        baseCost: 250000, desc: 'words/sec ×2',    count: 0, apply: () => { multiplier *= 2; } },
  ];

  function upgradeCost(upg) {
    return Math.floor(upg.baseCost * Math.pow(1.5, upg.count));
  }

  // ── Messages ───────────────────────────────────────────────────────────────
  const MSG_POOLS = {
    0:    ["It looks like you're not clicking me.", "Hi there! Need help with something?", "Have you tried clicking me?"],
    10:   ["Words! I see words happening!", "Keep going! You're doing great.", "Looks like you're writing something!"],
    100:  ["Now we're cooking. Keep going.", "100 words! That's a paragraph.", "You're practically a journalist."],
    1000: ["A thousand words. That's an essay. You're an essayist now.", "1,000 words! I'm impressed.", "Almost ready to submit that assignment."],
    10000:["Parsa wishes he could write this fast.", "10,000 words. We're talking a short story.", "Have you considered a career in content?"],
    100000:["100,000 words. That's a novel.", "Clippy has never been prouder.", "I believe I can help you format that manuscript."],
  };

  const MILESTONES = [100, 1000, 10000, 100000];
  const MILESTONE_MSGS = {
    100:    "100 words! That's a full paragraph!",
    1000:   "1,000 words! Essay territory!",
    10000:  "10,000 words! Parsa is shaking.",
    100000: "100,000 WORDS. You've written a novel.",
  };

  let milestonesHit = new Set();
  let currentMessage = MSG_POOLS[0][0];
  let messageTimer = null;

  function pickMessage() {
    const w = Math.floor(words);
    let pool = MSG_POOLS[0];
    if (w >= 100000) pool = MSG_POOLS[100000];
    else if (w >= 10000) pool = MSG_POOLS[10000];
    else if (w >= 1000) pool = MSG_POOLS[1000];
    else if (w >= 100) pool = MSG_POOLS[100];
    else if (w >= 10) pool = MSG_POOLS[10];
    return pool[Math.floor(Math.random() * pool.length)];
  }

  function showMessage(msg) {
    document.getElementById('speech-bubble').textContent = msg;
    currentMessage = msg;
  }

  function checkMilestones() {
    for (const m of MILESTONES) {
      if (!milestonesHit.has(m) && words >= m) {
        milestonesHit.add(m);
        showMessage(MILESTONE_MSGS[m]);
        clearTimeout(messageTimer);
        messageTimer = setTimeout(() => showMessage(pickMessage()), 3500);
      }
    }
  }

  // ── Format numbers ─────────────────────────────────────────────────────────
  function fmt(n) {
    return Math.floor(n).toLocaleString('en-US');
  }

  // ── Render UI ──────────────────────────────────────────────────────────────
  function renderUpgrades() {
    const list = document.getElementById('upgrades-list');
    list.innerHTML = '';
    UPGRADES.forEach(upg => {
      const cost = upgradeCost(upg);
      const canAfford = words >= cost;
      const btn = document.createElement('button');
      btn.className = 'upgrade-btn';
      btn.disabled = !canAfford;
      btn.innerHTML = `
        <div class="upg-top">
          <span class="upg-name">${upg.name}</span>
          <span class="upg-cost">💰 ${fmt(cost)}</span>
        </div>
        <div class="upg-desc">${upg.desc}</div>
        ${upg.count > 0 ? `<div class="upg-owned">Owned: ${upg.count}</div>` : ''}
      `;
      btn.addEventListener('click', () => buyUpgrade(upg));
      list.appendChild(btn);
    });
  }

  function updateDisplay() {
    const w = Math.floor(words);
    document.getElementById('word-counter').textContent = fmt(words);
    document.getElementById('title-text').textContent = `📎 Clippy Clicker — Words Written: ${fmt(words)}`;
    document.getElementById('per-second').textContent = `per second: ${(wordsPerSec * multiplier).toFixed(1)}`;
    document.getElementById('status-wpc').textContent = `+${wordsPerClick * multiplier} word/click`;
    document.getElementById('status-wps').textContent = `${(wordsPerSec * multiplier).toFixed(1)} words/sec`;
    document.getElementById('status-multi').textContent = `×${multiplier} multiplier`;
    renderUpgrades();
    checkMilestones();
  }

  // ── Clippy click ───────────────────────────────────────────────────────────
  const clippySvg = document.getElementById('clippy-svg');

  clippySvg.addEventListener('click', function(e) {
    words += wordsPerClick * multiplier;

    // Scale animation
    this.style.transform = 'scale(0.9)';
    setTimeout(() => { this.style.transform = 'scale(1)'; }, 80);

    // Floating +N popup
    spawnPopup(e.clientX, e.clientY, wordsPerClick * multiplier);

    // Occasionally change message
    if (Math.random() < 0.15) showMessage(pickMessage());

    updateDisplay();
  });

  function spawnPopup(x, y, amount) {
    const el = document.createElement('div');
    el.className = 'float-popup';
    el.textContent = '+' + fmt(amount);
    el.style.left = (x - 15) + 'px';
    el.style.top = (y - 10) + 'px';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 750);
  }

  // Eye follow cursor
  document.addEventListener('mousemove', function(e) {
    movePupil('pupil-l', 34, 31, e.clientX, e.clientY);
    movePupil('pupil-r', 48, 31, e.clientX, e.clientY);
  });

  function movePupil(id, baseX, baseY, mx, my) {
    const svg = clippySvg;
    const rect = svg.getBoundingClientRect();
    const svgCX = rect.left + (baseX / 80) * rect.width;
    const svgCY = rect.top + (baseY / 100) * rect.height;
    const dx = mx - svgCX;
    const dy = my - svgCY;
    const dist = Math.sqrt(dx * dx + dy * dy);
    const maxR = 1.2;
    const nx = dist > 0 ? (dx / dist) * Math.min(dist / 60, maxR) : 0;
    const ny = dist > 0 ? (dy / dist) * Math.min(dist / 60, maxR) : 0;
    const el = document.getElementById(id);
    if (el) {
      el.setAttribute('cx', baseX + nx);
      el.setAttribute('cy', baseY + ny);
    }
  }

  // ── Buy upgrade ────────────────────────────────────────────────────────────
  function buyUpgrade(upg) {
    const cost = upgradeCost(upg);
    if (words < cost) return;
    words -= cost;
    upg.count++;
    upg.apply();
    showMessage(`Nice! ${upg.name} purchased.`);
    clearTimeout(messageTimer);
    messageTimer = setTimeout(() => showMessage(pickMessage()), 2500);
    updateDisplay();
  }

  // ── Per-second tick ────────────────────────────────────────────────────────
  setInterval(() => {
    if (wordsPerSec > 0) {
      words += (wordsPerSec * multiplier) / 10;
      updateDisplay();
    }
  }, 100);

  // ── Init ───────────────────────────────────────────────────────────────────
  updateDisplay();
</script>
</body>
</html>
