<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>...</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{
  height:100%;width:100%;
  background:#000;
  font-family:'Courier New',Courier,monospace;
  overflow:hidden;
}
body{
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:0;
}

/* Subtle scanlines */
body::after{
  content:'';
  position:fixed;inset:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.08) 2px,rgba(0,0,0,0.08) 4px);
  pointer-events:none;z-index:100;
}

.prompt{
  color:#666;
  font-size:11px;
  letter-spacing:3px;
  text-transform:uppercase;
  margin-bottom:52px;
  animation:fadeIn 2s ease forwards;
  opacity:0;
}
@keyframes fadeIn{0%{opacity:0}100%{opacity:1}}

.choices{
  display:flex;
  gap:64px;
  align-items:flex-end;
  animation:fadeInUp 2.5s ease forwards;
  opacity:0;
}
@keyframes fadeInUp{0%{opacity:0;transform:translateY(10px)}100%{opacity:1;transform:translateY(0)}}

.choice{
  display:flex;flex-direction:column;align-items:center;gap:14px;
  cursor:pointer;
  transition:transform 0.2s;
  text-decoration:none;
}
.choice:hover{transform:translateY(-6px)}
.choice:hover .choice-label{color:#fff}
.choice:hover .choice-icon{filter:drop-shadow(0 0 18px rgba(255,255,255,0.25))}

.choice-icon{
  width:80px;height:80px;
  display:flex;align-items:center;justify-content:center;
  filter:drop-shadow(0 0 6px rgba(255,255,255,0.05));
  transition:filter 0.3s;
}

.choice-label{
  color:#333;
  font-size:10px;
  letter-spacing:2px;
  text-transform:uppercase;
  transition:color 0.2s;
}

/* Water SVG */
.water-svg{color:#1a5a7a}
/* Crack SVG */
.crack-svg{color:#888}
/* Gun SVG */
.gun-svg{color:#555}

.dividers{
  display:flex;gap:64px;margin-top:44px;
  animation:fadeIn 3s ease forwards;opacity:0;
}
.div-line{width:80px;height:1px;background:#1a1a1a}

.footer{
  position:fixed;bottom:24px;
  color:#1a1a1a;font-size:9px;letter-spacing:1px;
  animation:fadeIn 4s ease forwards;opacity:0;
}
</style>
</head>
<body>

<div class="prompt">choose your weapon.</div>

<div class="choices">

  <!-- Water -->
  <a class="choice" href="secret3.html">
    <div class="choice-icon">
      <svg width="64" height="80" viewBox="0 0 64 80" xmlns="http://www.w3.org/2000/svg">
        <!-- Glass -->
        <path d="M18 16 L14 72 Q14 76 18 76 L46 76 Q50 76 50 72 L46 16 Z" fill="#0a1a2a" stroke="#1a3a5a" stroke-width="1.5"/>
        <!-- Water fill -->
        <path d="M19.5 44 L15.5 72 Q15.5 74.5 18 74.5 L46 74.5 Q48.5 74.5 48.5 72 L44.5 44 Z" fill="#0d2d44" opacity="0.9"/>
        <!-- Water top ripple -->
        <ellipse cx="32" cy="44" rx="12.5" ry="2" fill="#0f3d5a" opacity="0.8"/>
        <!-- Highlight -->
        <path d="M21 20 L19 60" stroke="#1a4a6a" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
        <!-- Glass rim -->
        <line x1="18" y1="16" x2="46" y2="16" stroke="#1a3a5a" stroke-width="1.5"/>
        <!-- Condensation drops -->
        <circle cx="13" cy="56" r="1.2" fill="#0a2a3a" opacity="0.6"/>
        <circle cx="51" cy="48" r="1" fill="#0a2a3a" opacity="0.5"/>
        <circle cx="52" cy="60" r="0.8" fill="#0a2a3a" opacity="0.4"/>
      </svg>
    </div>
    <div class="choice-label">water</div>
  </a>

  <!-- Crack -->
  <a class="choice" href="secret3.html">
    <div class="choice-icon">
      <svg width="64" height="80" viewBox="0 0 64 80" xmlns="http://www.w3.org/2000/svg">
        <!-- Small rocks/chunks -->
        <polygon points="24,28 38,22 46,34 40,46 26,48 18,38" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="1.5"/>
        <polygon points="28,32 36,26 42,36 38,44 28,44 22,36" fill="#222" opacity="0.8"/>
        <!-- Crystalline faces -->
        <polygon points="28,32 36,26 36,35 28,35" fill="#2a2a2a" stroke="#333" stroke-width="0.8"/>
        <polygon points="36,26 42,36 36,35" fill="#252525" stroke="#333" stroke-width="0.8"/>
        <polygon points="28,35 36,35 38,44 28,44" fill="#1d1d1d" stroke="#333" stroke-width="0.8"/>
        <!-- Shine -->
        <line x1="30" y1="27" x2="28" y2="32" stroke="#444" stroke-width="1" stroke-linecap="round"/>
        <circle cx="34" cy="25" r="1" fill="#3a3a3a" opacity="0.6"/>
        <!-- Second chunk -->
        <polygon points="38,50 50,46 54,58 46,64 34,62" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="1.5"/>
        <polygon points="40,52 48,50 50,58 44,62 36,60" fill="#222" opacity="0.7"/>
        <polygon points="40,52 48,50 48,56 40,56" fill="#2a2a2a" stroke="#333" stroke-width="0.8"/>
        <circle cx="46" cy="47" r="0.8" fill="#3a3a3a" opacity="0.5"/>
        <!-- Third chunk small -->
        <polygon points="14,46 22,44 24,54 18,58 10,54" fill="#161616" stroke="#2a2a2a" stroke-width="1"/>
      </svg>
    </div>
    <div class="choice-label">crack</div>
  </a>

  <!-- Gun -->
  <a class="choice" href="secret3.html">
    <div class="choice-icon">
      <svg width="64" height="80" viewBox="0 0 64 80" xmlns="http://www.w3.org/2000/svg">
        <!-- Barrel -->
        <rect x="8" y="32" width="36" height="8" rx="2" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="1.2"/>
        <!-- Slide -->
        <rect x="16" y="28" width="26" height="16" rx="2" fill="#1c1c1c" stroke="#2a2a2a" stroke-width="1.2"/>
        <!-- Slide serrations -->
        <line x1="34" y1="30" x2="34" y2="43" stroke="#141414" stroke-width="2"/>
        <line x1="37" y1="30" x2="37" y2="43" stroke="#141414" stroke-width="2"/>
        <line x1="40" y1="30" x2="40" y2="43" stroke="#141414" stroke-width="2"/>
        <!-- Trigger guard -->
        <path d="M28 44 Q28 56 34 56 Q40 56 40 44" fill="none" stroke="#2a2a2a" stroke-width="2"/>
        <!-- Trigger -->
        <line x1="33" y1="44" x2="34" y2="52" stroke="#2a2a2a" stroke-width="1.5"/>
        <!-- Grip -->
        <rect x="28" y="44" width="14" height="20" rx="3" fill="#181818" stroke="#2a2a2a" stroke-width="1.2"/>
        <!-- Grip texture -->
        <line x1="30" y1="48" x2="40" y2="48" stroke="#111" stroke-width="0.8"/>
        <line x1="30" y1="52" x2="40" y2="52" stroke="#111" stroke-width="0.8"/>
        <line x1="30" y1="56" x2="40" y2="56" stroke="#111" stroke-width="0.8"/>
        <line x1="30" y1="60" x2="40" y2="60" stroke="#111" stroke-width="0.8"/>
        <!-- Muzzle highlight -->
        <circle cx="10" cy="36" r="2" fill="#111" stroke="#282828" stroke-width="1"/>
        <!-- Sight -->
        <rect x="40" y="27" width="4" height="3" rx="0.5" fill="#222" stroke="#2a2a2a" stroke-width="0.8"/>
        <!-- Hammer -->
        <rect x="42" y="30" width="3" height="6" rx="1" fill="#1e1e1e" stroke="#2a2a2a" stroke-width="0.8"/>
      </svg>
    </div>
    <div class="choice-label">gun</div>
  </a>

</div>

<div class="dividers">
  <div class="div-line"></div>
  <div class="div-line"></div>
  <div class="div-line"></div>
</div>

<div class="footer">water → crack → gun &nbsp;|&nbsp; you got here somehow</div>

</body>
</html>
